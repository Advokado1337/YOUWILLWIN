services:
  postgres:
    image: postgres:17-alpine
    container_name: youwillwin-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: youwillwin
      POSTGRES_USER: youwillwin
      POSTGRES_PASSWORD: youwillwin
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
